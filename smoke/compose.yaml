name: sluice-smoke
services:
  redis:
    image: redis:7-alpine
    ports: ["16379:6379"]
  minio:
    image: minio/minio:latest
    command: server /data
    environment: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
    ports: ["19000:9000"]
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c",
      "until mc alias set m http://minio:9000 minioadmin minioadmin; do sleep 1; done && mc mb -p m/sluice && echo BUCKET_READY"]
  gateway:
    image: sluice-gateway:test
    depends_on: [redis, minio]
    ports: ["18080:8080"]
    environment: &backend
      QUEUE__BACKEND: redis
      QUEUE__OPTIONS: '{"url": "redis://redis:6379/0"}'
      OBJECT_STORE__BACKEND: minio
      OBJECT_STORE__OPTIONS: '{"bucket": "sluice", "endpoint_url": "http://minio:9000"}'
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
  worker:
    image: sluice-example-seg:test
    profiles: [work]
    restart: "no"
    environment:
      <<: *backend
      WORKER__APP: topwear
      WORKER__SOURCE: topwear
      WORKER__WAIT_SECONDS: "2"
      WORKER__MAX_BLANK_RETRIES: "5"
