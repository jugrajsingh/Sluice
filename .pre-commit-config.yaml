# =============================================================================
# Pre-commit configuration — Sluice (uv workspace monorepo)
# =============================================================================
#
# Setup:
#   pre-commit install
#   pre-commit run --all-files
#
# Conventions:
#   - Hook ordering: Security → Autofix → Lint+fix → Validation → Git quality
#   - Autofixers modify files first so linters/validators see clean code
#   - Ruff replaces: black, isort, flake8, bandit, autopep8, autoflake
#   - ruff rev is pinned to match the CI pin (.github/workflows/ci.yml)
#
# =============================================================================

minimum_pre_commit_version: 3.6.0
default_install_hook_types:
  - pre-commit
  - commit-msg
fail_fast: true

repos:
  # ============================================================
  # 1. SECURITY (block secrets and vulnerabilities early)
  # ============================================================

  # Detect secrets, API keys, credentials in any file type.
  # Respects .gitleaksignore at the repo root.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Audit uv-locked deps for known CVEs. Local hook (not the upstream
  # pypa/pip-audit hook, which breaks on uv-only editable sources): pipes
  # `uv export` into pip-audit, skipping editable workspace members.
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit (uv-locked deps)
        entry: bash -c 'uv export --frozen --no-emit-project --no-hashes | uv tool run pip-audit -r /dev/stdin --disable-pip --no-deps --skip-editable --desc --format=columns'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key

  # ============================================================
  # 2. AUTOFIX: whitespace and formatting (modify files first)
  # ============================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args:
          - --fix=lf

  # ============================================================
  # 3. PYTHON: RUFF (format first, then lint+fix)
  # ============================================================

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      # Formatting FIRST (replaces black) — so linter sees formatted code
      - id: ruff-format
      # Linting SECOND with auto-fix (includes isort, security)
      - id: ruff
        args:
          - --fix
          - --exit-non-zero-on-fix

  # ============================================================
  # 4. VALIDATION: read-only checks (no file modifications)
  # ============================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Python validation
      - id: check-ast
      - id: debug-statements

      # File format validation
      - id: check-yaml
        exclude: '^charts/sluice/templates/'  # Go-templated YAML
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args:
          - --maxkb=1000

  # ============================================================
  # 5. GIT QUALITY (merge conflicts, casing)
  # ============================================================

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      # no-commit-to-branch intentionally omitted: this repo commits to main

  # ============================================================
  # 6. CONVENTIONAL COMMITS (commit-msg stage)
  # ============================================================

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages:
          - commit-msg
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
