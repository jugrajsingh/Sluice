[project]
name = "sluice-drivers"
version = "0.0.0"
requires-python = ">=3.13"
license = { text = "AGPL-3.0-or-later" }
dependencies = ["sluice-core"]

[project.optional-dependencies]
redis = ["redis>=5"]
aws = ["aioboto3>=13"]
gcs = ["gcloud-aio-storage>=9", "google-cloud-storage>=2.18"]
test = ["pytest>=8", "pytest-asyncio>=0.23", "fakeredis>=2.23", "moto[server]>=5", "testcontainers>=4"]

[tool.uv.sources]
sluice-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_drivers"]
