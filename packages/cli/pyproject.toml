[project]
name = "sluice-cli"
version = "0.1.0"
requires-python = ">=3.13"
license = { text = "AGPL-3.0-or-later" }
dependencies = ["sluice-core", "httpx>=0.27", "typer>=0.12", "pyyaml>=6", "rich>=13"]
[project.optional-dependencies]
direct = ["sluice-drivers[redis,aws,gcs]"]
test = ["pytest>=8", "pytest-asyncio>=0.23"]
[project.scripts]
sluice = "sluice_cli.main:main"
[tool.uv.sources]
sluice-core = { workspace = true }
sluice-drivers = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_cli"]
