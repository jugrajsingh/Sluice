[project]
name = "sluice-gateway"
version = "0.0.0"
requires-python = ">=3.13"
dependencies = ["sluice-core", "sluice-drivers[redis,aws,gcs]", "fastapi>=0.111", "uvicorn>=0.30", "prometheus-client>=0.20"]
[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23", "httpx>=0.27"]
[tool.uv.sources]
sluice-core = { workspace = true }
sluice-drivers = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_gateway"]
