[project]
name = "sluice-worker"
version = "0.0.0"
requires-python = ">=3.13"
license = { text = "AGPL-3.0-or-later" }
dependencies = ["sluice-core", "sluice-drivers[redis,aws,gcs]", "httpx>=0.27"]
[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23"]
[tool.uv.sources]
sluice-core = { workspace = true }
sluice-drivers = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_worker"]
