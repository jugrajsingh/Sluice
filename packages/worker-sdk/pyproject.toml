[project]
name = "sluice-worker"
version = "0.0.0"
requires-python = ">=3.13"
license = { text = "AGPL-3.0-or-later" }
dependencies = ["sluice-core", "sluice-drivers[redis,aws,gcs]", "httpx>=0.27"]
[project.optional-dependencies]
# sluice-gateway (→ fastapi) is a TEST-only dep: test_batch_e2e.py builds the real gateway app to
# exercise the worker↔gateway batch flow end-to-end. Needed so CI's isolated `--package sluice-worker
# --extra test` sync can collect it (full-workspace `pytest` had fastapi from the gateway already).
test = ["pytest>=8", "pytest-asyncio>=0.23", "sluice-gateway"]
[tool.uv.sources]
sluice-core = { workspace = true }
sluice-drivers = { workspace = true }
sluice-gateway = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_worker"]
