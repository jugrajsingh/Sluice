[project]
name = "sluice-autoscaler"
version = "0.0.0"
requires-python = ">=3.13"
dependencies = ["sluice-core", "sluice-drivers[redis,aws,gcs]", "kubernetes-asyncio>=31", "prometheus-client>=0.20", "aiohttp>=3.9", "aioboto3>=13"]
[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23", "moto[server]>=5"]
[tool.uv.sources]
sluice-core = { workspace = true }
sluice-drivers = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["sluice_autoscaler"]
