[project]
name = "sluice-core"
version = "0.0.0"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings[yaml]>=2.3",
    "pyjwt>=2.8",
]

[project.optional-dependencies]
test = ["pytest>=8", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sluice_core"]
