apiVersion: sluice/v1
kind: App
metadata: { name: your-model }
spec:
  image: REGISTRY/your-worker:tag
  handler: handler:MyHandler           # WORKER__HANDLER inside your image
  queue: { ref: your-model }
  resources: { gpu: 1, gpuType: nvidia-l4, cpu: 2, memoryGb: 8 }
  worker:
    type: handler          # handler (in-process BaseHandler) | sidecar (HTTP model server + adapter)
    instances: 2           # model replicas packed onto each GPU (no MPS); per-candidate overridable
  # messagesPerWorker is per packed unit (≈ per-replica throughput × instances)
  scaling: { messagesPerWorker: 20, maxWorkers: 0, scaleUpCount: 3, scheduleGraceSeconds: 180 }
  # placement is an ORDERED list of candidates; the controller tries each in turn and marks
  # a candidate stocked-out (shared across apps) before advancing to the next.
  placement:
    # 1) a targeted GPU spot pool in THIS cluster, then a broader spot selector
    - type: kubernetes
      provider: in-cluster                 # in-cluster | <registered external cluster name>
      spec:
        pricing: spot
        nodeSelectors:                      # ordered: try the first, fall back to the next
          - { cloud.google.com/gke-nodepool: l4-spot, gpu: l4, lifecycle: spot }
          - { cloud.google.com/gke-spot: "true" }
        tolerations:
          - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
        scheduleGraceSeconds: 180
    # 2) burst to spot VMs across regions when the cluster is out of GPU capacity
    - type: vm
      provider: gce
      spec:
        pricing: spot
        machineType: g2-standard-8
        acceleratorType: nvidia-l4
        regions: [us-central1, europe-west3]
