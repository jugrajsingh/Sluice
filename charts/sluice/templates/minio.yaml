{{- if .Values.minio.enabled }}
{{- if not .Values.minio.credentialsSecret }}
{{- fail "minio.enabled=true requires minio.credentialsSecret (a Secret with keys root-user and root-password)" }}
{{- end }}
# Bundled dev MinIO (S3-compatible object store) for a self-contained control cluster. Point the
# object store at it with object_store.backend=s3 and
# object_store.options: { bucket: <name>, endpoint_url: http://sluice-minio:9000 }. Workers receive
# pre-signed URLs (ADR-005), so the endpoint must also be reachable from where workers run.
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: sluice-minio, labels: { app.kubernetes.io/name: sluice-minio } }
spec:
  serviceName: sluice-minio
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: sluice-minio } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sluice-minio }
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image }}"
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: "{{ .Values.minio.credentialsSecret }}", key: root-user } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: "{{ .Values.minio.credentialsSecret }}", key: root-password } }
          ports: [ { containerPort: 9000 }, { containerPort: 9001 } ]
          volumeMounts: [ { name: data, mountPath: /data } ]
          livenessProbe: { httpGet: { path: /minio/health/live, port: 9000 }, initialDelaySeconds: 10 }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: "{{ .Values.minio.storage }}" } }
---
apiVersion: v1
kind: Service
metadata: { name: sluice-minio }
spec:
  selector: { app.kubernetes.io/name: sluice-minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
{{- end }}
