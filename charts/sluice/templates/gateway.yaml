apiVersion: apps/v1
kind: Deployment
metadata: { name: sluice-gateway, labels: { app.kubernetes.io/name: sluice-gateway } }
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector: { matchLabels: { app.kubernetes.io/name: sluice-gateway } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sluice-gateway }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8080", prometheus.io/path: /metrics }
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.image.registry }}/sluice-gateway:{{ .Values.image.tag }}"
          command: ["uvicorn", "sluice_gateway.main:app", "--host", "0.0.0.0", "--port", "8080"]
          env:
{{ include "sluice.backendEnv" . | indent 12 }}
            - { name: GATEWAY__T_SYNC_SECONDS, value: "{{ .Values.gateway.tSyncSeconds }}" }
            {{- if .Values.broker.signingKeySecret }}
            - name: GATEWAY__SIGNING_KEY
              valueFrom: { secretKeyRef: { name: "{{ .Values.broker.signingKeySecret }}", key: signing-key } }
            {{- end }}
{{ include "sluice.backendSecretEnvFrom" . }}
          ports: [ { containerPort: 8080 } ]
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: sluice-gateway }
spec:
  selector: { app.kubernetes.io/name: sluice-gateway }
  ports: [ { port: 80, targetPort: 8080 } ]
