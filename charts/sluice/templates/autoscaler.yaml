{{- $caps := list "storage" "state" "queue" "cache" "compute" -}}
apiVersion: v1
kind: ServiceAccount
metadata: { name: sluice-autoscaler }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: sluice-autoscaler }
rules:
  # Create bare worker pods synthesized from the App spec; reap exited/failed pods.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Leader election.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: sluice-autoscaler }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: sluice-autoscaler }
subjects:
  - { kind: ServiceAccount, name: sluice-autoscaler, namespace: "{{ .Release.Namespace }}" }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: sluice-autoscaler, labels: { app.kubernetes.io/name: sluice-autoscaler } }
spec:
  replicas: {{ .Values.autoscaler.replicas }}
  selector: { matchLabels: { app.kubernetes.io/name: sluice-autoscaler } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sluice-autoscaler }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8081", prometheus.io/path: /metrics }
    spec:
      serviceAccountName: sluice-autoscaler
{{- include "sluice.imagePullSecrets" . }}
      containers:
        - name: autoscaler
          image: "{{ .Values.image.registry }}/sluice-autoscaler:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "sluice_autoscaler.main"]
          env:
{{ include "sluice.backendEnv" . | indent 12 }}
            - { name: AUTOSCALER__IN_CLUSTER, value: "1" }
            - { name: AUTOSCALER__LEASE_NAMESPACE, value: "{{ .Release.Namespace }}" }
            - { name: AUTOSCALER__WORKERS_NAMESPACE, value: "{{ .Release.Namespace }}" }
            {{- if .Values.autoscaler.placement.prober }}
            - { name: AUTOSCALER__PROBER, value: "{{ .Values.autoscaler.placement.prober }}" }
            {{- end }}
            {{- if .Values.autoscaler.placement.workerBaseImage }}
            - { name: PLACEMENT__WORKER_BASE_IMAGE, value: "{{ .Values.autoscaler.placement.workerBaseImage }}" }
            {{- end }}
            {{- if .Values.autoscaler.placement.providerDefaults }}
            - { name: PLACEMENT__PROVIDER_DEFAULTS, value: {{ .Values.autoscaler.placement.providerDefaults | toJson | quote }} }
            {{- end }}
            {{- if .Values.broker.signingKeySecret }}
            - { name: AUTOSCALER__BROKER_URL, value: "{{ .Values.broker.url }}" }
            - name: AUTOSCALER__SIGNING_KEY
              valueFrom: { secretKeyRef: { name: "{{ .Values.broker.signingKeySecret }}", key: signing-key } }
            {{- end }}
            {{- if .Values.clusters }}
            {{- $entries := list }}
            {{- range .Values.clusters }}
            {{- $entries = append $entries (dict "name" .name "kubeconfig_path" (printf "/var/secrets/clusters/%s/kubeconfig" .name) "namespace" (.namespace | default $.Release.Namespace)) }}
            {{- end }}
            - { name: AUTOSCALER__CLUSTERS, value: {{ toJson $entries | quote }} }
            {{- end }}
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
{{- include "sluice.credFileEnv" (dict "root" $ "caps" $caps) }}
{{- include "sluice.credEnvFrom" (dict "root" $ "caps" $caps) }}
          ports: [ { containerPort: 8081 } ]
          livenessProbe: { httpGet: { path: /healthz, port: 8081 }, initialDelaySeconds: 10 }
          {{- $cmounts := include "sluice.credVolumeMounts" (dict "root" $ "caps" $caps) }}
          {{- if or (trim $cmounts) .Values.clusters }}
          volumeMounts:
{{- $cmounts }}
            {{- range .Values.clusters }}
            - { name: "cluster-{{ .name }}", mountPath: "/var/secrets/clusters/{{ .name }}", readOnly: true }
            {{- end }}
          {{- end }}
      {{- $cvols := include "sluice.credVolumes" (dict "root" $ "caps" $caps) }}
      {{- if or (trim $cvols) .Values.clusters }}
      volumes:
{{- $cvols }}
        {{- range .Values.clusters }}
        - name: "cluster-{{ .name }}"
          secret: { secretName: "{{ .kubeconfigSecret }}" }
        {{- end }}
      {{- end }}
