{{- $caps := list "storage" "queue" -}}
apiVersion: v1
kind: ServiceAccount
metadata: { name: sluice-console }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: sluice-console }
rules:
  # Read worker pods + events for the live worker table. App mutations go to the
  # spec store (object storage), not the Kubernetes API.
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: sluice-console }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: sluice-console }
subjects:
  - { kind: ServiceAccount, name: sluice-console, namespace: "{{ .Release.Namespace }}" }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: sluice-console, labels: { app.kubernetes.io/name: sluice-console } }
spec:
  replicas: {{ .Values.console.replicas }}
  selector: { matchLabels: { app.kubernetes.io/name: sluice-console } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: sluice-console }
    spec:
      serviceAccountName: sluice-console
{{- include "sluice.imagePullSecrets" . }}
      containers:
        - name: console
          image: "{{ .Values.image.registry }}/sluice-console:{{ .Values.image.tag }}"
          command: ["uvicorn", "sluice_console.main:app", "--host", "0.0.0.0", "--port", "8080"]
          env:
{{ include "sluice.backendEnv" . | indent 12 }}
{{- include "sluice.credFileEnv" (dict "root" $ "caps" $caps) }}
{{- include "sluice.credEnvFrom" (dict "root" $ "caps" $caps) }}
          ports: [ { containerPort: 8080 } ]
          livenessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
          {{- $mounts := include "sluice.credVolumeMounts" (dict "root" $ "caps" $caps) }}
          {{- if trim $mounts }}
          volumeMounts:
{{- $mounts }}
          {{- end }}
      {{- $vols := include "sluice.credVolumes" (dict "root" $ "caps" $caps) }}
      {{- if trim $vols }}
      volumes:
{{- $vols }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata: { name: sluice-console }
spec:
  selector: { app.kubernetes.io/name: sluice-console }
  ports: [ { port: 80, targetPort: 8080 } ]
